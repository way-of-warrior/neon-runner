<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Google AdSense (Replace ca-pub-XXXXXXXXXXXXXXXX with your actual Publisher ID) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=pub-3327310875038921" crossorigin="anonymous"></script>
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- UI HUD Layer -->
        <div id="hud" class="hidden">
            <div id="hud-top">
                <div id="lives-container">
                    <span id="lives-display">❤️❤️❤️</span>
                </div>
                <div id="score-container">
                    <div id="score">0</div>
                    <div id="high-score">HI: 0</div>
                </div>
                <div id="speed-container">
                    <div id="combo-display">COMBO x1.0</div>
                    <div id="speed-multiplier">1.0x SPD</div>
                    <button id="btn-mute" class="neon-btn">🔊</button>
                </div>
            </div>
            <div id="hud-center">
                <div id="notification"></div>
            </div>
            <div id="hud-bottom">
                <div id="powerup-bar-container" class="hidden">
                    <div id="powerup-bar-fill"></div>
                    <div id="powerup-label">SHIELD</div>
                </div>
            </div>
        </div>

        <!-- Overlays -->
        <div id="screen-start" class="screen overlay">
            <h1 class="glitch-text" data-text="NEON RUNNER">NEON RUNNER</h1>
            <p>High Score: <span id="start-high-score">0</span></p>
            <div class="instructions">
                <p>Controls:</p>
                <p>Arrows / WASD / Swipe</p>
                <p>Up: Jump | Down: Duck | Left/Right: Move</p>
            </div>
            <p class="blink">PRESS ANY KEY OR TAP TO START</p>
        </div>

        <div id="screen-paused" class="screen overlay hidden">
            <h1>PAUSED</h1>
            <button id="btn-resume" class="neon-btn">RESUME</button>
            <button id="btn-restart-pause" class="neon-btn">RESTART</button>
        </div>

        <div id="screen-game-over" class="screen overlay hidden">
            <h1>GAME OVER</h1>
            <h2 id="final-score">SCORE: 0</h2>
            <p id="new-high-score-msg" class="hidden blink">NEW HIGH SCORE 🏆</p>
            
            <!-- Google AdSense Banner -->
            <div id="ad-container" style="margin: 20px 0; width: 320px; height: 100px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(0,255,255,0.3); display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 0.8rem; color: #555; position: absolute;">ADVERTISEMENT</span>
                <ins class="adsbygoogle"
                     style="display:inline-block;width:320px;height:100px;position:relative;z-index:1;"
                     data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                     data-ad-slot="YOUR_AD_SLOT_ID"></ins>
            </div>

            <button id="btn-restart-go" class="neon-btn">PLAY AGAIN</button>
        </div>

        <!-- Mobile Controls (D-Pad) -->
        <div id="mobile-controls" class="hidden">
            <button id="btn-up" class="dpad-btn pos-up">▲</button>
            <button id="btn-left" class="dpad-btn pos-left">◀</button>
            <button id="btn-right" class="dpad-btn pos-right">▶</button>
            <button id="btn-down" class="dpad-btn pos-down">▼</button>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
